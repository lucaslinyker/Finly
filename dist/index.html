<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finly</title>
    <script src="https://kit.fontawesome.com/f567caf46e.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header class="flex items-center justify-between p-10">
        <h1 class="font-bold text-6xl">Finly</h1>
        <menu>
            <ul class="flex gap-4">
                <li>Home</li>
                <li>Sobre</li>
                <li>Blog</li>
                <li>Preços</li>
                <li>Trabalhe conosco</li>
                <div class="flex gap-4">
                    <li><a class="bg-zinc-700 rounded-2xl px-4 py-2 text-white" href="">Entrar</a></li>
                    <li><a class="" href="">Criar conta</a></li>
                </div>
            </ul>
        </menu>
    </header>

    <main>
        <section class="relative">
            <img class="h-132.5 w-full object-cover brightness-90" src="images/landscape.jpg" alt="Imagem">
            <span class="w-10/12 absolute top-1/2 left-1/2 -translate-1/2 text-white text-center text-4xl font-bold">Explore o mundo enquanto cuidamos da sua vida financeira</span>
        </section>

        <section class="flex flex-col lg:flex-row items-center justify-around text-center">
            <img src="images/finance-man.png" alt="Homem de finanças">
            <p class="text-4xl font-bold px-7 my-4">A liberdade financeira que você sempre sonhou na palma da sua mão</p>
        </section>
    </main>

    <footer class="bg-background-secondary flex items-center justify-between flex-wrap px-4 py-8">
        <p class="w-full sm:w-auto text-center">@ 2026 Finly, Inc. Todos os direitos reservados.</p>

        <ul class="w-full sm:w-auto flex gap-4 justify-evenly mt-3 sm:mt-0">
            <li>
                <a href="http://youtube.com" target="_blank" rel="noopener noreferrer">
                    <i class="fa-brands fa-youtube fa-xl"></i>
                </a>
            </li>
            <li>
                <a href="http://instagram.com" target="_blank" rel="noopener noreferrer">
                    <i class="fa-brands fa-instagram fa-xl"></i>
                </a>
            </li>
            <li>
                <a href="http://linkedin.com" target="_blank" rel="noopener noreferrer">
                    <i class="fa-brands fa-linkedin-in fa-xl"></i>
                </a>
            </li>
            <li>
                <a href="http://x.com" target="_blank" rel="noopener noreferrer">
                    <i class="fa-brands fa-x-twitter fa-xl"></i>
                </a>
            </li>
        </ul>
    </footer>
</body>
</html>
